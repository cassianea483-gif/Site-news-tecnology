<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoGlobo | Registrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-page">
        <div class="login-wrapper">
            <section class="form-card">
                <h1 class="brand">InfoGlobo</h1>
                <p class="subtitle">Crie sua conta</p>

                <form id="register-form" class="login-form">
                    <div class="form-group">
                        <label for="reg-name">Nome completo</label>
                        <input type="text" id="reg-name" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group input-with-toggle">
                        <label for="reg-password">Senha</label>
                        <input type="password" id="reg-password" required placeholder="Senha">
                        <button type="button" class="pw-toggle" aria-label="Mostrar senha"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                    <div class="form-group input-with-toggle">
                        <label for="reg-confirm">Confirmar senha</label>
                        <input type="password" id="reg-confirm" required placeholder="Confirmar senha">
                        <button type="button" class="pw-toggle" aria-label="Mostrar senha"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                    <button type="submit" class="btn btn-primary">Criar conta</button>
                </form>

                <p class="signup">Já tem uma conta? <a href="login.html" class="link">Entrar</a></p>
            </section>
        </div>
    </main>

    <script src="theme.js"></script>
    <script src="app.js"></script>
</body>
</html>
