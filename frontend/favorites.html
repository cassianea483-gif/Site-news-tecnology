<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>InfoGlobo | Meus Favoritos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950/90 text-slate-100 font-body-md overflow-x-hidden">

<!-- Top Navigation -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(0,242,255,0.15)]">
    <a href="index.html" class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">INFOGLOBO</a>
    <div class="flex items-center gap-md">
        <span id="user-info" class="text-slate-300 text-sm font-label-sm hidden"></span>
        <button class="theme-toggle material-symbols-outlined" aria-label="Alternar tema"></button>
        <button id="logout-btn" class="material-symbols-outlined text-slate-400 hover:text-red-400 transition-colors scale-95 active:opacity-80" style="border: none; background: none; cursor: pointer;">logout</button>
    </div>
</nav>

<!-- Main Content -->
<main class="pt-20 px-6 pb-xl min-h-screen max-w-6xl mx-auto">
    <div class="mb-xl">
        <div class="flex items-center gap-sm mb-md">
            <span class="material-symbols-outlined text-cyan-400" style="font-variation-settings: 'FILL' 1; min-width: 32px; min-height: 32px; font-size: 32px;">favorite</span>
            <h1 class="font-headline-xl text-primary tracking-tight">Meus Favoritos</h1>
        </div>
        <p class="text-slate-400 text-body-lg">Seus artigos salvos para leitura posterior</p>
    </div>

    <!-- Favorites Grid -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md" id="favorites-container">
        <div style="text-align: center; color: #b9cacb; padding: 60px; grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <span class="material-symbols-outlined" style="font-size: 48px; margin-bottom: 16px; min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center;">inbox</span>
            Carregando seus favoritos...
        </div>
    </section>
</main>

<!-- Background -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-cyan-500/10 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-purple-500/5 blur-[150px]"></div>
</div>

<script src="app.js"></script>
<script src="theme.js"></script>
</body>
</html>
